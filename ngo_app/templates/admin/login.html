<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/admin/assets/images/favicon.png" type="image/x-icon">
    <link rel="shortcut icon" href="/static/admin/assets/images/favicon.png" type="image/x-icon">
    <title>Welcome To Login Panel</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- CSS — same as PHP -->
    <link rel="stylesheet" type="text/css" href="/static/admin/assets/css/fontawesome.css">
    <link rel="stylesheet" type="text/css" href="/static/admin/assets/css/icofont.css">
    <link rel="stylesheet" type="text/css" href="/static/admin/assets/css/themify.css">
    <link rel="stylesheet" type="text/css" href="/static/admin/assets/css/flag-icon.css">
    <link rel="stylesheet" type="text/css" href="/static/admin/assets/css/feather-icon.css">
    <link rel="stylesheet" type="text/css" href="/static/admin/assets/css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="/static/admin/assets/css/style.css">
    <link rel="stylesheet" type="text/css" href="/static/admin/assets/css/color-1.css">
    <link rel="stylesheet" type="text/css" href="/static/admin/assets/css/responsive.css">
</head>
<body>
    <!-- Loader -->
    <div class="loader-wrapper">
        <div class="theme-loader">
            <div class="loader-p"></div>
        </div>
    </div>

    <section>
        <div class="container-fluid">
            <div class="row">
                <!-- Left side: Logo -->
                <div class="col-xl-6 pt-5 text-center">
                    <img src="/static/web/logo.png" alt="Logo" width="60%">
                </div>
                <!-- Right side: Login form -->
                <div class="col-xl-6 p-0">
                    <div class="login-card">
                        {% if error %}
                        <div class="alert alert-danger mx-4">{{ error }}</div>
                        {% endif %}
                        <form class="theme-form login-form" id="login_form" method="post" action="{% url 'admin_login' %}">
                            {% csrf_token %}
                            <h4>Login</h4>
                            <h6>Welcome back! Log in to your account.</h6>
                            <div class="form-group">
                                <label>Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="icon-email"></i></span>
                                    <input type="email" class="form-control" id="user_id" name="user_id" placeholder="Test@gmail.com" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="icon-lock"></i></span>
                                    <input class="form-control" type="password" name="password" required placeholder="*********">
                                </div>
                            </div>
                            <div class="form-group">
                                <button class="btn btn-primary btn-block" type="submit">Sign in</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- JS — same as PHP -->
    <script src="/static/admin/assets/js/jquery-3.5.1.min.js"></script>
    <script src="/static/admin/assets/js/icons/feather-icon/feather.min.js"></script>
    <script src="/static/admin/assets/js/icons/feather-icon/feather-icon.js"></script>
    <script src="/static/admin/assets/js/sidebar-menu.js"></script>
    <script src="/static/admin/assets/js/config.js"></script>
    <script src="/static/admin/assets/js/bootstrap/popper.min.js"></script>
    <script src="/static/admin/assets/js/bootstrap/bootstrap.min.js"></script>
    <script src="/static/admin/assets/js/script.js"></script>
</body>
</html>
