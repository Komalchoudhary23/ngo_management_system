{% extends "admin/base.html" %}
{% block title %}CMS - About Page{% endblock %}
{% block content %}
<div class="page-header"><h4 class="m-b-0">Update About Page</h4></div>
<div class="row"><div class="col-sm-12"><div class="card"><div class="card-body">
<form id="edit_about_page" method="post">
  {% csrf_token %}
  {% with a=about_page_data.first %}
  <div class="row" style="border:1px solid #e7e7e7;padding:2%;">
    <h5>About Section Content</h5>
    <div class="col-sm-6 mb-3">
      <label>Main Heading</label>
      <input type="text" class="form-control" name="heading" value="{{ a.heading|default:'' }}" placeholder="Main Heading">
    </div>
    <div class="col-sm-6 mb-3">
      <label>Subheading 1</label>
      <input type="text" class="form-control" name="subheading1" value="{{ a.subheading1|default:'' }}" placeholder="Subheading 1">
      <textarea class="form-control mt-2" name="desc1" rows="3" placeholder="Description 1">{{ a.desc1|default:'' }}</textarea>
    </div>
    <div class="col-sm-6 mb-3">
      <label>Subheading 2</label>
      <input type="text" class="form-control" name="subheading2" value="{{ a.subheading2|default:'' }}" placeholder="Subheading 2">
      <textarea class="form-control mt-2" name="desc2" rows="3" placeholder="Description 2">{{ a.desc2|default:'' }}</textarea>
    </div>
    <div class="col-sm-6 mb-3">
      <label>Subheading 3</label>
      <input type="text" class="form-control" name="subheading3" value="{{ a.subheading3|default:'' }}" placeholder="Subheading 3">
      <textarea class="form-control mt-2" name="desc3" rows="3" placeholder="Description 3">{{ a.desc3|default:'' }}</textarea>
    </div>
  </div>
  {% endwith %}
  <div class="mt-3">
    <button type="submit" class="btn btn-secondary me-3">Save</button>
  </div>
</form>
</div></div></div></div>
{% endblock %}
{% block extra_js %}<script>
var _submitting = false;
$("#edit_about_page").on("submit",function(e){
    if (_submitting) return;
    _submitting = true;
  e.preventDefault();
  $.ajax({url:"{% url 'insert_about_page_data' %}",type:"POST",data:new FormData(this),processData:false,contentType:false,
    success:function(d){ if(d.status){ Swal.fire("Success",d.msg,"success"); } else { Swal.fire("Error",d.msg,"error"); } }
  });
});
</script>{% endblock %}
